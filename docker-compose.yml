services:
  db:
    image: postgres:16-alpine
    container_name: youngtravel-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: young_travel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d young_travel"]
      interval: 5s
      timeout: 5s
      retries: 10

  webserver:
    container_name: youngtravel-web
    build:
      context: .
      dockerfile: WebServer/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:7071
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=young_travel;Username=postgres;Password=postgres
    ports:
      - "7071:7071"

volumes:
  postgres_data:
